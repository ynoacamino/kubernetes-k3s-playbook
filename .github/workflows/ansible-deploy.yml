name: Ansible Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ansible-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible
      
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass
      
      - name: Install Ansible Galaxy requirements
        run: |
          if [ -f requirements.yml ]; then
            ansible-galaxy install -r requirements.yml
          fi
      
      - name: Create vault password file
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass
        
      - name: Run init-kube-nodes playbook
        run: |
          ansible-playbook playbooks/init-kube-nodes.yml \
            -i inventory.yml \
            --vault-password-file .vault_pass
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'

      - name: Run init-kube-nodes-master playbook
        run: |
          ansible-playbook playbooks/init-kube-nodes-master.yml \
            -i inventory.yml \
            --vault-password-file .vault_pass
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'

      - name: Run init-kube-nodes-worker playbook
        run: |
          ansible-playbook playbooks/init-kube-nodes-worker.yml \
            -i inventory.yml \
            --vault-password-file .vault_pass
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
      
      - name: Clean up vault password
        if: always()
        run: rm -f .vault_pass
