---
- name: Deploy K3s Cluster with Headscale VPN
  hosts: kube_nodes
  become: true

  vars:
    k3s_become: true
    k3s_build_cluster: true
    k3s_registration_address: "{{ groups['kube_nodes_master'][0].split('.')[0] }}.{{ headscale_base_domain }}"

  roles:
    - role: headscale-client

  pre_tasks:
    # ========================================
    # Set K3s configuration with Tailscale IPs
    # ========================================
    - name: Set K3s server configuration (master)
      ansible.builtin.set_fact:
        k3s_server:
          write-kubeconfig-mode: '0644'
          cluster-cidr: '10.42.0.0/16'
          service-cidr: '10.43.0.0/16'
          tls-san:
            - "{{ groups['kube_nodes_master'][0].split('.')[0] }}.{{ headscale_base_domain }}"
          node-ip: "{{ tailscale_node_ip }}"
          node-external-ip: "{{ node_public_ip }}"
          flannel-iface: "tailscale0"
          advertise-address: "{{ tailscale_node_ip }}"
          kubelet-preferred-address-types: InternalIP,Hostname,ExternalIP
      when: k3s_control_node | default(false)

    - name: Set K3s agent configuration (workers)
      ansible.builtin.set_fact:
        k3s_agent:
          node-ip: "{{ tailscale_node_ip }}"
          node-external-ip: "{{ node_public_ip }}"
          flannel-iface: "tailscale0"
      when: not (k3s_control_node | default(false))

  tasks:
    # ========================================
    # Deploy K3s Cluster
    # ========================================
    - name: Deploy K3s cluster
      ansible.builtin.include_role:
        name: xanmanning.k3s

  post_tasks:
    # ========================================
    # Force svclb-traefik pods to pick up node-external-ip
    # ========================================
    - name: Get svclb-traefik pod names
      ansible.builtin.command: >
        kubectl get pods -n kube-system
        -l svccontroller.k3s.cattle.io/svcname=traefik
        -o jsonpath='{.items[*].metadata.name}'
      register: svclb_pods
      changed_when: false
      failed_when: false
      when: k3s_control_node | default(false)

    - name: Delete svclb-traefik pods to pick up node-external-ip
      ansible.builtin.command: >
        kubectl delete pods -n kube-system
        -l svccontroller.k3s.cattle.io/svcname=traefik
      changed_when: svclb_pods.stdout | trim != ''
      when:
        - k3s_control_node | default(false)
        - svclb_pods is succeeded
        - svclb_pods.stdout | trim != ''

    - name: Wait for svclb-traefik pods to be ready
      ansible.builtin.command: >
        kubectl wait pods -n kube-system
        -l svccontroller.k3s.cattle.io/svcname=traefik
        --for=condition=Ready --timeout=120s
      changed_when: false
      when:
        - k3s_control_node | default(false)
        - svclb_pods is succeeded

    - name: Verify K3s cluster is healthy
      ansible.builtin.command: kubectl get nodes
      register: k3s_nodes
      changed_when: false
      failed_when: false
      when: k3s_control_node | default(false)

    - name: Display cluster status
      ansible.builtin.debug:
        var: k3s_nodes.stdout_lines
      when:
        - k3s_control_node | default(false)
        - k3s_nodes is succeeded
