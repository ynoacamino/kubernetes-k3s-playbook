- name: Initialize Kube Node VPS
  hosts: kube_nodes
  become: true

  roles:
    - role: geerlingguy.docker
    - role: swap

  tasks:
    - name: Update package list
      ansible.builtin.apt:
        update_cache: true

    - name: Upgrade all installed packages
      ansible.builtin.apt:
        upgrade: dist
        autoremove: true

    - name: Install essential packages
      ansible.builtin.apt:
        name: "{{ essential_packages }}"
        state: present

    - name: Set timezone to UTC
      community.general.timezone:
        name: "{{ timezone }}"

    - name: Configure UFW rules
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
      loop: "{{ ufw_rules }}"

    - name: Configure master K3s UFW rules (restricted to Tailscale subnet)
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
        from_ip: "{{ item.from_ip | default('any') }}"
      loop: "{{ kube_master_ufw_rules }}"
      when: k3s_control_node | default(false)

    - name: Configure worker K3s UFW rules (restricted to Tailscale subnet)
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
        from_ip: "{{ item.from_ip | default('any') }}"
      loop: "{{ kube_worker_ufw_rules }}"
      when: not (k3s_control_node | default(false))

    - name: Allow traffic forwarding for pod and service CIDRs
      community.general.ufw:
        rule: allow
        route: true
        src: "{{ item }}"
      loop:
        - "10.42.0.0/16"
        - "10.43.0.0/16"

    - name: Enable UFW
      community.general.ufw:
        state: enabled
