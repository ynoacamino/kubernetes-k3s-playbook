- name: Check if swap file exists
  ansible.builtin.stat:
    path: "{{ swap_file_path }}"
  register: swap_file_check

- name: Check if swap is active
  ansible.builtin.command: swapon --show
  register: swap_active
  changed_when: false
  failed_when: false

- name: Create swap file
  ansible.builtin.command: "fallocate -l {{ swap_file_size }} {{ swap_file_path }}"
  when: not swap_file_check.stat.exists
  args:
    creates: "{{ swap_file_path }}"

- name: Set swap file permissions
  ansible.builtin.file:
    path: "{{ swap_file_path }}"
    mode: "0600"
    state: file

- name: Check if swap file is formatted
  ansible.builtin.command: "file {{ swap_file_path }}"
  register: swap_file_type
  changed_when: false
  failed_when: false

- name: Format swap file if not already formatted
  ansible.builtin.command: "mkswap {{ swap_file_path }}"
  when: "'swap file' not in swap_file_type.stdout | lower"
  register: swap_mkswap_result
  changed_when: swap_mkswap_result.rc == 0

- name: Enable swap file
  ansible.builtin.command: "swapon {{ swap_file_path }}"
  when: swap_file_path not in swap_active.stdout
  register: swap_swapon_result
  changed_when: swap_swapon_result.rc == 0

- name: Add swap to fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    line: "{{ swap_file_path }} none swap sw 0 0"
    state: present

- name: Configure swappiness
  ansible.posix.sysctl:
    name: vm.swappiness
    value: "{{ swap_swappiness }}"
    state: present
    reload: true

- name: Configure vfs_cache_pressure
  ansible.posix.sysctl:
    name: vm.vfs_cache_pressure
    value: "{{ swap_vfs_cache_pressure }}"
    state: present
    reload: true
