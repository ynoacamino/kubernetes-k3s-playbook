---
# Headscale Server Configuration
headscale_version: "0.28.0"
headscale_base_dir: "/opt/headscale"
headscale_data_dir: "{{ headscale_base_dir }}/data"
headscale_config_dir: "{{ headscale_base_dir }}/config"

# Network Configuration
headscale_listen_addr: "0.0.0.0:8080"
headscale_metrics_addr: "127.0.0.1:9090"
headscale_grpc_addr: "0.0.0.0:50443"
headscale_grpc_insecure: false

# Server URL (must be HTTPS for production)
headscale_server_url: "https://headscale.example.com"

# DNS Configuration
headscale_magic_dns: true
headscale_base_domain: "example.com"
headscale_nameservers:
  - "1.1.1.1"
  - "1.0.0.1"

# IP Allocation
headscale_ipv4_prefix: "100.64.0.0/10"
headscale_ipv6_prefix: "fd7a:115c:a1e0::/48"
headscale_allocation_strategy: "sequential"

# DERP Configuration
headscale_derp_auto_update: true
headscale_derp_update_frequency: "24h"

# Database
headscale_db_type: "sqlite"
headscale_db_path: "/var/lib/headscale/db.sqlite"

# Ephemeral nodes
headscale_ephemeral_timeout: "30m"

# Log Configuration
headscale_log_level: "info"
headscale_log_format: "text"

# TLS Configuration (handled by Traefik)
headscale_tls_letsencrypt_hostname: ""
headscale_tls_cert_path: ""
headscale_tls_key_path: ""

# Traefik Integration
headscale_traefik_enabled: true
headscale_traefik_domain: "headscale.example.com"
headscale_traefik_network: "traefik-net"
headscale_traefik_certresolver: "dnsresolver"

# UFW Rules
headscale_ufw_rules:
  - port: "8080"
    proto: "tcp"
  - port: "50443"
    proto: "tcp"
