---
# =============================================================================
# Generate Headscale Preauth Key (Master Node Only)
# =============================================================================

- name: Check if Headscale user exists
  ansible.builtin.command: docker exec {{ headscale_container_name }} headscale users list --output json
  register: headscale_users
  changed_when: false
  failed_when: false

- name: Create Headscale user if not exists
  ansible.builtin.command: docker exec {{ headscale_container_name }} headscale users create {{ headscale_user }}
  when: "headscale_user not in headscale_users.stdout"
  changed_when: "headscale_user not in headscale_users.stdout"

- name: Get updated user list
  ansible.builtin.command: docker exec {{ headscale_container_name }} headscale users list --output json
  register: headscale_users_updated
  changed_when: false

- name: Extract user ID
  ansible.builtin.set_fact:
    kube_user_id: "{{ (headscale_users_updated.stdout | from_json | selectattr('name', 'equalto', headscale_user) | first).id }}"

- name: List existing preauth keys
  ansible.builtin.command: >
    docker exec {{ headscale_container_name }} headscale preauthkeys list
    --user {{ kube_user_id }}
    --output json
  register: existing_keys
  changed_when: false
  failed_when: false

- name: Filter valid reusable keys
  ansible.builtin.set_fact:
    valid_keys: >-
      {{
        existing_keys.stdout | from_json
        | selectattr('Reusable', 'equalto', true)
        | selectattr('Expiration', 'gt', ansible_date_time.iso8601)
        | list
      }}
  when: existing_keys.rc == 0 and existing_keys.stdout != '[]'

- name: Extract first valid key if exists
  ansible.builtin.set_fact:
    valid_key: "{{ valid_keys[0].Key }}"
  when:
    - valid_keys is defined
    - valid_keys | length > 0

- name: Generate Headscale preauth key only if needed
  ansible.builtin.command: >
    docker exec {{ headscale_container_name }} headscale preauthkeys create
    --user {{ kube_user_id }}
    --expiration {{ headscale_preauth_expiration }}
    {% if headscale_preauth_reusable %}--reusable{% endif %}
    --output json
  register: preauth_key_result
  changed_when: true
  when: (valid_key | default('')) == ''

- name: Extract and cache preauth key
  ansible.builtin.set_fact:
    generated_tailscale_key: "{{ (preauth_key_result.stdout | from_json).key if (valid_key | default('')) == '' else valid_key }}"
    cacheable: true
