- name: Configure UFW monitoring rules (restricted to VPN)
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    from_ip: "{{ vpn_client_network }}"
  loop: "{{ monitoring_ufw_rules }}"

- name: Enable UFW
  community.general.ufw:
    state: enabled

- name: Create opt directories
  ansible.builtin.file:
    path: "/opt/monitoring/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - portainer
    - node_exporter
    - cadvisor

- name: Create Portainer docker-compose file from template
  ansible.builtin.template:
    src: "portainer/docker-compose.yml.j2"
    dest: "/opt/monitoring/portainer/docker-compose.yml"
    mode: "0644"
  notify: Restart Portainer

- name: Start Portainer container
  community.docker.docker_compose_v2:
    project_src: "/opt/monitoring/portainer"
    state: present

- name: Create Node Exporter docker-compose file from template
  ansible.builtin.template:
    src: "node_exporter/docker-compose.yml.j2"
    dest: "/opt/monitoring/node_exporter/docker-compose.yml"
    mode: "0644"
  notify: Restart Node Exporter

- name: Start Node Exporter container
  community.docker.docker_compose_v2:
    project_src: "/opt/monitoring/node_exporter"
    state: present

- name: Create cAdvisor docker-compose file from template
  ansible.builtin.template:
    src: "cadvisor/docker-compose.yml.j2"
    dest: "/opt/monitoring/cadvisor/docker-compose.yml"
    mode: "0644"
  notify: Restart cAdvisor

- name: Start cAdvisor container
  community.docker.docker_compose_v2:
    project_src: "/opt/monitoring/cadvisor"
    state: present
