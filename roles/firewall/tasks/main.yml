---
# =============================================================================
# Firewall - Main Tasks
# =============================================================================

- name: Set default UFW incoming policy
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Set default UFW outgoing policy
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Set default UFW routed policy
  community.general.ufw:
    direction: routed
    policy: deny

- name: Configure base UFW rules (from group_vars)
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
  loop: "{{ ufw_rules | default([]) }}"
  when: ufw_rules is defined

- name: Configure K3s master UFW rules (restricted to Headscale subnet)
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    from_ip: "{{ item.from_ip | default('any') }}"
  loop: "{{ kube_master_ufw_rules | default([]) }}"
  when:
    - k3s_control_node | default(false)
    - kube_master_ufw_rules is defined

- name: Configure K3s worker UFW rules (restricted to Headscale subnet)
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    from_ip: "{{ item.from_ip | default('any') }}"
  loop: "{{ kube_worker_ufw_rules | default([]) }}"
  when:
    - not (k3s_control_node | default(false))
    - kube_worker_ufw_rules is defined

- name: Allow traffic forwarding for K3s pod and service CIDRs
  community.general.ufw:
    rule: allow
    route: true
    src: "{{ item }}"
  loop:
    - "{{ firewall_k3s_pod_cidr }}"
    - "{{ firewall_k3s_service_cidr }}"

- name: Enable UFW
  community.general.ufw:
    state: enabled
  when: firewall_enabled | default(true)

- name: Display UFW status
  ansible.builtin.command: ufw status verbose
  register: firewall_ufw_status
  changed_when: false

- name: Show firewall status
  ansible.builtin.debug:
    var: firewall_ufw_status.stdout_lines
