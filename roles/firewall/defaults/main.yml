---
# =============================================================================
# Firewall Role - Default Variables
# =============================================================================
# These are the base defaults - they will be combined with group_vars
# in the tasks to build the complete ruleset

# Whether to enable UFW
firewall_enabled: true

# K3s pod and service CIDRs for routing rules
firewall_k3s_pod_cidr: "10.42.0.0/16"
firewall_k3s_service_cidr: "10.43.0.0/16"
